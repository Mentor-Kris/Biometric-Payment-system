<!DOCTYPE html>
<html>
<head>
  <title>OTP Verification</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card" style="margin:100px auto; text-align:center; width:350px;">
  <h2>Enter OTP</h2>

  <input type="text" id="otpInput" placeholder="Enter OTP" maxlength="4"><br><br>

  <button class="btn" onclick="checkOTP()">Verify OTP</button>
</div>

<script src="script.js"></script>

<script>
  const otp = Math.floor(1000 + Math.random() * 9000);

  localStorage.setItem("otp", otp);

  setTimeout(() => {
    alert("📩 OTP sent to your mobile number");
    alert("Your OTP is: " + otp);
  }, 800);
</script>

</body>
</html>
